
# ── Camera ────────────────────────────────────────────────────────────────────
camera:
  rtsp_url: "rtsp://admin:diffuse123@192.168.0.183:554/cam/realmonitor?channel=1&subtype=2"
  transport: "tcp"
  reconnect_delay_sec: 5
  frame_buffer_size: 1
  connection_timeout_sec: 30

# ── Detection ─────────────────────────────────────────────────────────────────
detection:
  min_contour_area_px2: 500
  blur_kernel_size: 11          # was 21 — 11 is plenty for noise removal, ~4x faster
  dilate_iterations: 2
  diff_threshold: 25            # abs pixel diff vs locked reference frame
  process_every_n_frames: 2     # run detector on every Nth frame (1 = every frame)
                                # 2 = halves detector CPU; 3 = cuts to 33%

# ── Alerts ────────────────────────────────────────────────────────────────────
alerts:
  snapshot_dir: alerts/snapshots
  json_dir: alerts/json
  cooldown_sec: 5
  jpeg_quality: 90
  draw_bounding_boxes: true
  draw_zone_on_snapshot: true
  timestamp_watermark: true

# ── Display ───────────────────────────────────────────────────────────────────
display:
  window_title: "RTSP Motion Detection"
  display_fps: 15               # main loop target FPS — keeps CPU from spinning
  show_status_bar: true
  show_motion_banner: true
  zone_color_normal:  [0, 220, 0]
  zone_color_motion:  [0, 0, 255]
  box_color:          [0, 0, 255]

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  config_file: "config/logging.yaml"